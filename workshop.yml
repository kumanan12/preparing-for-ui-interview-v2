Title: Interviewing for Front-End Engineers, v2
Subtitle: Spend two full days with Evgenii Ray learning the skills and techniques to ace front-end engineering interviews.

Teachers:
  - ray

Excerpt: Spend two full days with Evgenii Ray learning the skills and techniques to ace front-end engineering interviews.

Benefits:
  - Solve the most common interview problems
  - Master common modern web techniques and hacks to efficiently solve any UI interview problems
  - Learn how to buld components using Vanila TS / JS. Gain confidence with both vanilla JS and React approaches
  - Learn DOM manipulation and event handling best practices
  - Solve advanced TypeScript type-level challenges
  - Understand architectural patterns for complex UIs (spreadsheets, infinite canvas, chats)

Summary: |
  Interviews are hard! I've passed and failed many in my career, and the best way to prepare is to practice.
  This intensive two-day workshop prepares you for front-end engineering interviews at top tech companies. 
  We'll work through progressively challenging problems—from quick warm-ups to complex and challenging tasks, covering 
  JavaScript fundamentals, React component patterns, DOM APIs, and TypeScript type gymnastics.
  We solve problems in both vanilla JavaScript and React. Problems are intentionally harder than real 
  interview questions, so actual interviews feel more manageable.

Audience:
  Overview: |
    This workshop is designed for front-end engineers at all levels—from Junior to Staff—who want to 
    sharpen their interview skills. Whether you're preparing for your first front-end role or targeting 
    senior/staff positions at top companies, you'll find appropriately challenging material.

  Prerequisites:
    - Comfortable with TypeScript and modern JavaScript (ES6+)
    - Basic knowledge of React (components, hooks, state)
    - Familiarity with DOM APIs and browser fundamentals
    - An IDE ready to go (VS Code, WebStorm, or similar)

